<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 6</title>
    <link rel="stylesheet" href="../../../../styles/Choices.css" />
    <link rel="stylesheet" href="../../../../master.css" />
  </head>
  <body>
    <div class="page">
      <div class="board">
        <div class="section-title">
          <h2 class="animate-characters">Wähle aus:</h2>
        </div>
        <section class="question-container">
          <div class="question">
            1. .............. hast du Geburtstag? Im April.
            <div class="choices">
              (<span class="choice" isCorrect="false">Was</span> -
              <span class="choice" isCorrect="true">Wann</span> )
            </div>
          </div>
          <div class="question">
            2. Wie...................das Wetter?
            <div class="choices">
              (<span class="choice" isCorrect="false">ist</span> -
              <span class="choice" isCorrect="true">bin</span> )
            </div>
          </div>
          <div class="question">
            3. Mein...................ist im August
            <div class="choices">
              (<span class="choice" isCorrect="false">Wetter</span> -
              <span class="choice" isCorrect="true">Geburtstag</span> )
            </div>
          </div>
          <div class="question">
            4. Es ist...................im Winter
            <div class="choices">
              (<span class="choice" isCorrect="false">kalt</span> -
              <span class="choice" isCorrect="true">heiß</span> )
            </div>
          </div>
          <div class="question">
            5. Im Herbt ist es...................
            <div class="choices">
              (<span class="choice" isCorrect="false">sonnig</span> -
              <span class="choice" isCorrect="true">windig</span> )
            </div>
          </div>
        </section>
      </div>
    </div>
    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

          <img src="../../../../imgs/home.png" width="130" alt="Home" />

          <div class="openai-logo">
