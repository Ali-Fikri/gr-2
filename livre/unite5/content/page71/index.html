<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 6</title>
    <link rel="stylesheet" href="../../../../styles/yesOrNo.css" />
    <link rel="stylesheet" href="../../../../master.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div
              class="section-title"
              data-type="file"
              data-audio="./sounds/title.mp3">
              <h2 class="animate-characters">Ja (√) oder Nein (X)</h2>
            </div>
            <div class="activity">
              <div class="question" data-correct="true">
                <p>
                  1. Es ist kalt im Sommer
                  <img src="./imgs/1.png" alt="photo" />
                </p>

                <div class="choices">
                  <button class="choice" data-answer="true">✔️</button>
                  <button class="choice" data-answer="false">❌</button>
                </div>
              </div>
              <div class="question" data-correct="true">
                <p>
                  2. Es ist windig im Herbst
                  <img src="./imgs/2.png" alt="photo" />
                </p>

                <div class="choices">
                  <button class="choice" data-answer="true">✔️</button>
                  <button class="choice" data-answer="false">❌</button>
                </div>
              </div>
              <div class="question" data-correct="true">
                <p>
                  3. Es ist sonnig im Sommer
                  <img src="./imgs/3.png" alt="photo" />
                </p>

                <div class="choices">
                  <button class="choice" data-answer="true">✔️</button>
                  <button class="choice" data-answer="false">❌</button>
                </div>
              </div>
              <div class="question" data-correct="true">
                <p>
                  4. Es ist heiß im Sommer
                  <img src="./imgs/4.png" alt="photo" />
                </p>

                <div class="choices">
                  <button class="choice" data-answer="true">✔️</button>
                  <button class="choice" data-answer="false">❌</button>
                </div>
              </div>
              <div class="question" data-correct="true">
                <p>
                  5. Es ist klat im Winter
                  <img src="./imgs/5.png" alt="photo" />
                </p>

                <div class="choices">
                  <button class="choice" data-answer="true">✔️</button>
                  <button class="choice" data-answer="false">❌</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

    <footer>
      <div class="navigation">
        <a href="../page70-1/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/previous.png" alt="Previous" />
          </div>
        </a>

        <a href="../../../../index.html" class="home-btn">
          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>
      </div>
    </footer>

    <script src="../../../../scripts/yesOrNo.js"></script>
  </body>
</html>
