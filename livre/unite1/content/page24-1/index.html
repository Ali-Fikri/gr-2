<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 2 - Mein Familie</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/drag.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div class="section-title animate-characters">
              <h2>Ergänze “haben” in der richtigen Form:</h2>
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="question-item">
              1. Alia
              <input
                type="text"
                id="answerInput"
                data-answer="hat"
                placeholder="Voer uw antwoord in" />
              eine Schwester
            </div>
            <div class="question-item">
              2. Monika und Peter
              <input
                type="text"
                id="answerInput"
                data-answer="haben"
                placeholder="Voer uw antwoord in" />
              eine Tante
            </div>
            <div class="question-item">
              3. Ich
              <input
                type="text"
                id="answerInput"
                data-answer="habe"
                placeholder="Voer uw antwoord in" />
              einen Bruder
            </div>
            <div class="question-item">
              4. Du
              <input
                type="text"
                id="answerInput"
                data-answer="hast"
                placeholder="Voer uw antwoord in" />
              zwei Onkeln
            </div>
            <div class="question-item">
              5. Er
              <input
                type="text"
                id="answerInput"
                data-answer="hat"
                placeholder="Voer uw antwoord in" />
              drei Schwestern
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>
