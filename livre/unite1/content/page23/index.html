<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 2 - Mein Familie</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/drag.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div class="section-title">
              <h2 class="animate-characters">Ergänze den Dialog:</h2>
            </div>
            <div class="choices" style="color: darkred">
              (
              <span class="choice" draggable="true" answer="meine Mutter"
                >meine Mutter</span
              >
              -
              <span class="choice" draggable="true" answer="Guten Tag"
                >Guten Tag</span
              >
              -
              <span class="choice" draggable="true" answer="mein vater"
                >mein vater</span
              >

              )
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="question-item">Guten Tag</div>
            <div class="question-item">
              <span class="dots" answer="Guten Tag">.................</span>
            </div>
            <div class="question-item">
              Wer ist das?
              <img src="./imgs/1.png" class="image" alt="" />
            </div>

            <div class="question-item">
              Das ist
              <span class="dots" answer="mein vater">.................</span>
            </div>
            <div class="question-item">
              Und wer ist das?
              <img src="./imgs/2.png" class="image" alt="" />
            </div>
            <div class="question-item">
              Das ist
              <span class="dots" answer="mein Mutter">.................</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

    <footer>
      <div class="navigation">

          <div class="openai-logo">
            <img src="../../../../imgs/previous.png" alt="Previous" />
          </div>
        </a>

        <a href="../../../../index.html" class="home-btn">
          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>

        <a href="../page23-1/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/next.png" alt="next" />
          </div>
        </a>
      </div>
    </footer>

    <script src="../../../../master.js"></script>
    <script src="../../../../scripts/dragQuestion.js"></script>
  </body>
</html>
