<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <title>Lektion 1 - Sich vorstellen</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/associate.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="section-title">
          <h2 class="animate-characters">Was passt zusammen:</h2>
        </div>
        <div class="content">
          <div class="question">
            <div class="row">
              <div class="letter" data-match="4">
                1. Hallo! <span class="dot"></span>
              </div>

              <div class="image" data-id="1">
                Ich heiße lukas. <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="3">
                2. Wie heißt du? <span class="dot"></span>
              </div>
              <div class="image" data-id="2">
                Gut, danke. <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="2">
                3. Wie geht es dir? <span class="dot"></span>
              </div>
              <div class="image" data-id="3">
                Ich heiße Petra. <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="1">
                4. und du? <span class="dot"></span>
              </div>
              <div class="image" data-id="4">
                Hallo! <span class="dot"></span>
              </div>
            </div>

            <svg id="svg">
              <defs>
                <marker
                  id="arrow"
                  markerWidth="10"
                  markerHeight="10"
                  refX="6"
                  refY="3"
                  orient="auto">
                  <path d="M0,0 L0,6 L9,3 z" fill="currentColor" />
                </marker>
              </defs>
            </svg>
          </div>
        </div>

        <audio
          id="clapSound"
          src="../../../../sounds/clap.mp3"
          preload="auto"></audio>
        <audio
          id="inCorrectSound"
          src="../../../../sounds/incorrect.mp3"
          preload="auto"></audio>
      </section>

      <footer>
        <div class="navigation">
          <a href="../page13/index.html" class="button">
            <div class="openai-logo">
              <img src="../../../../imgs/previous.png" alt="Previous" />
            </div>
          </a>

          <a href="../../../../index.html" class="home-btn">
            <img src="../../../../imgs/home.png" width="130" alt="Home" />
          </a>

          <a href="../page15/index.html" class="button">
            <div class="openai-logo">
              <img src="../../../../imgs/next.png" alt="next" />
            </div>
          </a>
        </div>
      </footer>
    </div>

    <script src="../../../../scripts/associate.js"></script>
    <script src="../../../../master.js"></script>
  </body>
</html>
