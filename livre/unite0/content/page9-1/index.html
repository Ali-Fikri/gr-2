<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Lektion 1 - Sich vorstellen</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/associate.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="section-title">
          <h2 class="animate-characters">Ordne den Dialog:</h2>
        </div>
        <div class="content">
          <div class="question">
            <div class="row">
              <div class="letter" data-match="3">
                1. <span class="dot"></span>
              </div>

              <div class="image" data-id="1">
                Wer bist du? <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="1">
                2. <span class="dot"></span>
              </div>
              <div class="image" data-id="2">
                Guten Tag<span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="4">
                3. <span class="dot"></span>
              </div>
              <div class="image" data-id="3">
                Ich bin Anaa <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="7">
                4. <span class="dot"></span>
              </div>
              <div class="image" data-id="4">
                Wer ist er? <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="2">
                5. <span class="dot"></span>
              </div>
              <div class="image" data-id="5">
                Guten Tag <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="5">
                6. <span class="dot"></span>
              </div>
              <div class="image" data-id="6">
                Wer ist sie? <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="8">
                7. <span class="dot"></span>
              </div>
              <div class="image" data-id="7">
                Er ist Peter <span class="dot"></span>
              </div>
            </div>
            <div class="row">
              <div class="letter" data-match="6">
                8. <span class="dot"></span>
              </div>
              <div class="image" data-id="8">
                Sie ist Petra <span class="dot"></span>
              </div>
            </div>
            <svg id="svg">
              <defs>
                <marker
                  id="arrow"
                  markerWidth="10"
                  markerHeight="10"
                  refX="6"
                  refY="3"
                  orient="auto">
                  <path d="M0,0 L0,6 L9,3 z" fill="currentColor" />
                </marker>
              </defs>
            </svg>
          </div>
        </div>

        <audio
          id="clapSound"
          src="../../../../sounds/clap.mp3"
          preload="auto"></audio>
        <audio
          id="inCorrectSound"
          src="../../../../sounds/incorrect.mp3"
          preload="auto"></audio>
      </section>

      <footer>
        <div class="navigation">
          <a href="../page9/index.html" class="button">
            <div class="openai-logo">
              <img src="../../../../imgs/previous.png" alt="Previous" />
            </div>
          </a>

          <a href="../../../../index.html" class="home-btn">
            <img src="../../../../imgs/home.png" width="130" alt="Home" />
          </a>

          <a href="../page11/index.html" class="button">
            <div class="openai-logo">
              <img src="../../../../imgs/next.png" alt="next" />
            </div>
          </a>
        </div>
      </footer>
    </div>

    <script src="../../../../scripts/associate.js"></script>
    <script src="../../../../master.js"></script>
  </body>
</html>
