    <meta charset="UTF-8" />

    <title>Lektion 1 - Sich vorstellen</title>
    <link rel="stylesheet" href="../../../../styles/Choices.css" />
    <link rel="stylesheet" href="../../../../master.css" />
  </head>
  <body>
    <div class="page">
      <div class="board">
        <section class="question-container">
          <div class="question">
            1. Wer.......... du?
            <div class="choices">
              (<span class="choice" isCorrect="true">bist</span> -
              <span class="choice" isCorrect="false">ist</span> )
            </div>
          </div>
          <div class="question">
            2. Ich .......... Petra?
            <div class="choices">
              (<span class="choice" isCorrect="true">bin</span> -
              <span class="choice" isCorrect="false">bist</span> )
            </div>
          </div>
          <div class="question">
            3. Er.......... Müller?
            <div class="choices">
              (<span class="choice" isCorrect="true">ist</span> -
              <span class="choice" isCorrect="false">bin</span> )
            </div>
          </div>
          <div class="question">
            4. Mein Name.......... Julia.
            <div class="choices">
              (<span class="choice" isCorrect="true">ist</span> -
              <span class="choice" isCorrect="false">bin</span> )
            </div>
          </div>
          <div class="question">
            5. .......... ist dein Name?
            <div class="choices">
              (<span class="choice" isCorrect="false">Was</span> -
              <span class="choice" isCorrect="true">Wie</span> )
            </div>
          </div>
        </section>
      </div>
    </div>
    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>

      src="../../../../sounds/incorrect.mp3"
