<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 1 - Sich vorstellen</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/drag.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1 class="unite-title title" style="margin-bottom: 2.5rem">
          <span class="unite-subtitle"
            ><span style="color: #df5b2c">0</span> <br />Unité</span
          >Les gens que j’aime !
        </h1>
      </header>

      <section class="board">
        <div class="content">
          <div class="question-container">
            <div class="section-title">
              <h2 class="animate-characters">Ergänze den Dialog:</h2>
            </div>
            <div class="choices" style="color: darkred">
              (
              <span class="choice" draggable="true" answer="Wie geht es dir?"
                >Wie geht es dir?</span
              >
              -
              <span class="choice" draggable="true" answer="Hallo">Hallo</span>
              )
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="question-item">A: Hallo</div>
            <div class="question-item">
              B:
              <span class="dots" answer="Hallo">.................</span>
            </div>
            <div class="question-item">
              A:
              <span class="dots" answer="Wie geht es dir?"
                >.................</span
              >
            </div>
            <div class="question-item">B: Gut, danke</div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

    <footer>
      <div class="navigation">

          <div class="openai-logo">
            <img src="../../../../imgs/previous.png" alt="Previous" />
          </div>
        </a>

        <a href="../../../../index.html" class="home-btn">
          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>

        <a href="../page13-1/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/next.png" alt="next" />
          </div>
        </a>
      </div>
    </footer>

    <script src="../../../../master.js"></script>
    <script src="../../../../scripts/dragQuestion.js"></script>
  </body>
</html>
