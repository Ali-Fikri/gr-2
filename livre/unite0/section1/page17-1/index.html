<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 1 - Sich vorstellen</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/drag.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div class="section-title">
              <h2 class="animate-characters">Ergänze mit verb “sein”:</h2>
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="question-item">
              1. Ich
              <input
                type="text"
                id="answerInput"
                data-answer="bin"
                placeholder="Voer uw antwoord in" />
              lukas.
            </div>
            <div class="question-item">
              2. Sie
              <input
                type="text"
                id="answerInput"
                data-answer="ist"
                placeholder="Voer uw antwoord in" />
              Monika.
            </div>
            <div class="question-item">
              3. Du
              <input
                type="text"
                id="answerInput"
                data-answer="bist"
                placeholder="Voer uw antwoord in" />
              Peter.
            </div>
            <div class="question-item">
              4. Wir
              <input
                type="text"
                id="answerInput"
                data-answer="sind"
                placeholder="Voer uw antwoord in" />
              Alia und Petra.
            </div>
            <div class="question-item">
              5. Ihr
              <input
                type="text"
                id="answerInput"
                data-answer="seid"
                placeholder="Voer uw antwoord in" />
              Pauel und Monika.
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

    <footer>
      <div class="navigation">
        <a href="../page17/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/previous.png" alt="Previous" />
          </div>
        </a>

        <a href="../../../../index.html" class="home-btn">
          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>
      </div>
    </footer>

    <script src="../../../../master.js"></script>
    <script src="../../../../scripts/writeQustion.js"></script>
  </body>
</html>
