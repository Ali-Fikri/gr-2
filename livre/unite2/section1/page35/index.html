<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 3</title>
    <link rel="stylesheet" href="../../../../master.css" />
    <link rel="stylesheet" href="../../../../styles/drag.css" />
  </head>
  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div
              class="section-title animate-characters"
              data-type="tts"
              data-text="Ergänze:">
              <h2>Ergänze:</h2>
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="question-item">1. Ich komme aus Italien.</div>
            <div class="question-item">
              Meine Mutter Sprache ist
              <input
                type="text"
                id="answerInput"
                data-answer="Italienisch"
                placeholder="Voer uw antwoord in" />
            </div>
            <div class="question-item">2. Ich komme aus Ägypten.</div>
            <div class="question-item">
              Ich spreche
              <input
                type="text"
                id="answerInput"
                data-answer="Arabisch"
                placeholder="Voer uw antwoord in" />
            </div>
            <div class="question-item">3. Ich komme aus Deutschland.</div>
            <div class="question-item">
              Meine Mutter Sprache ist
              <input
                type="text"
                id="answerInput"
                data-answer="Deutsch"
                placeholder="Voer uw antwoord in" />
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

    <footer>

          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>

        <a href="../page35-1/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/next.png" alt="next" />
          </div>
        </a>
      </div>
    </footer>

    <script src="../../../../master.js"></script>
    <script src="../../../../scripts/writeQustion.js"></script>
  </body>
</html>
