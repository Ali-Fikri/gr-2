  <body>
    <div class="page">
      <section class="board">
        <div class="content">
          <div class="question-container">
            <div class="section-title animate-characters">
              <h2>Ordne die Dialoge:</h2>
            </div>
          </div>
          <br />
          <div class="answer-container">
            <div class="section-title">
              <h3>A</h3>
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="1"
                placeholder="Voer uw antwoord in" />
              Hallo, wie heißt du?
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="4"
                placeholder="Voer uw antwoord in" />
              Ich komme aus Ägypten?
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="2"
                placeholder="Voer uw antwoord in" />
              Hallo, Ich heiße Monika.
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="3"
                placeholder="Voer uw antwoord in" />
              Woher kommst du?
            </div>
            <div><h3 class="section-title">B</h3></div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="1"
                placeholder="Voer uw antwoord in" />
              Guten Tag, wo wohnst du?
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="4"
                placeholder="Voer uw antwoord in" />
              Ich spreche Deutsch.
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="3"
                placeholder="Voer uw antwoord in" />
              Was sprichst du?
            </div>
            <div class="question-item">
              <input
                type="text"
                id="answerInput"
                data-answer="2"
                placeholder="Voer uw antwoord in" />
              Guten Tag, Ich wohne in Berlin.
            </div>
          </div>
        </div>
      </section>
    </div>

    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
