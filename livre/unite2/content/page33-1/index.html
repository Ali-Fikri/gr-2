<!doctype html>
<html lang="de-DE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lektion 3</title>
    <link rel="stylesheet" href="../../../../styles/Choices.css" />
    <link rel="stylesheet" href="../../../../master.css" />
  </head>
  <body>
    <div class="page">
      <div class="board">
        <div class="section-title animate-characters"></div>
        <section class="question-container">
          <div class="question">
            1. Ich.............aus Deutschland
            <div class="choices">
              (<span class="choice" isCorrect="true">komme</span> -
              <span class="choice" isCorrect="false">spreches</span> )
            </div>
          </div>
          <div class="question">
            2. Du.............in Kairo
            <div class="choices">
              (<span class="choice" isCorrect="false">wohnst</span> -
              <span class="choice" isCorrect="true">wohne</span> )
            </div>
          </div>
          <div class="question">
            3. Ihr.............Deutsch
            <div class="choices">
              (<span class="choice" isCorrect="false">sprechen</span> -
              <span class="choice" isCorrect="true">sprecht</span> )
            </div>
          </div>
          <div class="question">
            4. Wir Kommen.............Ägypten
            <div class="choices">
              (<span class="choice" isCorrect="false">in</span> -
              <span class="choice" isCorrect="true">aus</span> )
            </div>
          </div>
          <div class="question">
            5. Sie wohnt.............Berlin
            <div class="choices">
              (<span class="choice" isCorrect="false">aus</span> -
              <span class="choice" isCorrect="true">in</span> )
            </div>
          </div>
        </section>
      </div>
    </div>
    <audio
      id="clapSound"
      src="../../../../sounds/clap.mp3"
      preload="auto"></audio>
    <audio
      id="inCorrectSound"
      src="../../../../sounds/incorrect.mp3"
      preload="auto"></audio>

          <img src="../../../../imgs/home.png" width="130" alt="Home" />
        </a>

        <a href="../page34/index.html" class="button">
          <div class="openai-logo">
            <img src="../../../../imgs/next.png" alt="next" />

      </div>
    </footer>

    <script src="../../../../scripts/choicesQuestion.js"></script>
  </body>
